<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me - Loc-chan Trash</title>
    <style>
        /* 1. Phần nền đại dương với hiệu ứng ánh sáng */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            /* Hiệu ứng Ocean: Xanh đậm ở dưới, ánh sáng xanh lơ ở góc trên */
            background: radial-gradient(circle at 20% 20%, rgba(100, 200, 255, 0.4) 0%, rgba(10, 45, 80, 1) 70%),
                linear-gradient(180deg, #1e3799 0%, #0a3d62 100%);
            background-attachment: fixed;
            /* Giữ nền đứng yên khi cuộn trang */
        }


        /* 2. Cái hộp (Card) chứa nội dung */
        .card {
            /* Dải màu từ xanh dương sang tím nhạt - Đã giữ nguyên như yêu cầu của bạn trước đó */
            background: linear-gradient(135deg, #cee1ff 0%, #c3cfe2 100%);
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            /* Đổ bóng xịn hơn */
            /* Áp dụng chuyển động fadeIn */
            animation: fadeIn 0.8s ease-out;

        }

        /* 3. Ảnh đại diện */
        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #007bff;
            margin-bottom: 15px;
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
        }

        p {
            color: #666;
            line-height: 1.6;
        }

        /* 4. Các nút mạng xã hội */
        .social-links {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            /* To lên một xíu */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            /* Đổ bóng đậm hơn khi chạm vào */
            opacity: 1;
        }

        /* Màu sắc riêng cho từng nút */
        .twitter {
            background-color: #1DA1F2;
        }

        .discord {
            background-color: #5865F2;
        }

        .github {
            background-color: #333;
        }

        /* Tạo chuyển động tên là 'fadeIn' */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Bố cục Gallery */
        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            /* Chia làm 2 cột */
            gap: 10px;
            margin-top: 15px;
        }

        /* Định dạng ảnh trong Gallery */
        .art-item {
            width: 100% !important;
            height: 100px !important;
            border-radius: 10px !important;
            border: none !important;
            object-fit: cover;
            /* Giúp ảnh không bị méo */
            transition: 0.3s;
            cursor: pointer;
        }

        .art-item:hover {
            transform: scale(1.1);
            /* Phóng to ảnh khi di chuột vào */
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Hello my name is Loc</h1>
        <p>I’m an artist and I’m learning to code.</p>
        <p>My hobbies are drawing, playing video games, listening to music, and watching anime.</p>

        <div class="social-links">
            <a href="#" onclick="alert('My Discord tag: Løc-chan trash#2220'); return false;"class="btn discord">Discord: Løc-chan trash#2220</a>
            <a href="https://x.com/TrashLoc" target="_blank" class="btn twitter"style="background-color: #1DA1F2;">Twitter</a>

            <a href="https://github.com/anhyou99" target="_blank" class="btn github" style="background-color: #333;">My GitHub</a>
            <a href="commission.html" class="btn" style="background-color: #ff4757;">Commission Page</a>
        </div>

        <h3 style="margin-top: 25px; color: #333;">My Artworks</h3>
        <div class="gallery">
            <img src="tranh1.jpg" class="art-item" alt="Artwork 1">
            <img src="tranh2.png" class="art-item" alt="Artwork 2">

        <div class="gallery">
            <img src="character.jpg" class="art-item" alt="My Character">
        </div>
    </div>
    

</body>
